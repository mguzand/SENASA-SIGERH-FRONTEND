<!-- Navigation -->
<ul class="layout-menu flex-1 overflow-y-auto p-4">
 
    @for (items of model; track items.id; let i = $index) {
      @if (items.separator) { 
        <li class="menu-separator"></li>  
      }@else {
        <li  app-menuitem [item]="items" [root]="true" [index]="i" ></li>
      }
    }
  </ul>
